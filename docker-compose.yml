services:
  mysql:
    image: mysql:8.0
    container_name: osteosalix-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: osteosalix
      MYSQL_USER: osteosalix
      MYSQL_PASSWORD: osteosalix
    ports:
      - '3306:3306'
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password

volumes:
  mysql_data:
